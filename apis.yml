apis:
  - aid: uc-davis:iet-middleware
    name: IET Middleware Web Service APIs
    description: >-
      Information and Educational Technology (IET) Middleware Web Service APIs provide
      campus integration and identity-related middleware services. Usage instructions
      are published via the IET Application Development documentation; access is
      typically gated for affiliated campus developers.
    humanURL: https://iet-ws.ucdavis.edu/api/
    tags: [ Identity, Middleware, Integration ]
    properties:
      - type: Documentation
        url: https://iet-ws.ucdavis.edu/api/
  - aid: uc-davis:health-integration
    name: UC Davis Health Systems Integration APIs
    description: >-
      UC Davis Health offers Epic (EHR), HL7 FHIR, and custom APIs accessed via SOAP
      or REST using JSON/XML. Authentication methods include API Key, OAuth2, and
      Direct Interconnect for existing Epic users, with traffic governed through
      InterSystems API Manager. Access is arranged through the systems integration
      team rather than open self-service.
    humanURL: https://health.ucdavis.edu/systems-integration/developers
    tags: [ Health, FHIR, Epic, Integration ]
    properties:
      - type: Documentation
        url: https://health.ucdavis.edu/systems-integration/developers
