aid: uc-davis
name: University of California, Davis
description: >-
  The University of California, Davis (UC Davis) is a public land-grant research
  university located in Davis, California, and ranked #48 in the QS World University
  Rankings 2025. Its public developer footprint is decentralized across campus units
  rather than a single unified developer portal. Confirmed surfaces include IET
  Middleware Web Service APIs (identity/integration middleware), a UC Davis Health
  systems-integration program offering Epic/FHIR and custom REST/SOAP APIs, the CAES
  Computing Resources Unit APIs (PEAKS, ACE), an internal developer SIG community at
  developers.ucdavis.edu, and the official ucdavis GitHub organization with 441+ public
  repositories. Most administrative and identity APIs are gated behind institutional
  affiliation, SSO, or partner agreements rather than open self-service signup.
