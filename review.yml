    rating: 3
    summary: >-
      UC Davis has a real but decentralized API footprint with no single unified
      developer portal. Verified live (HTTP 200): IET Middleware Web Service APIs,
      UC Davis Health systems-integration developer page (Epic/FHIR/custom REST-SOAP,
      API key/OAuth2), CAES PEAKS and ACE API docs, the developers.ucdavis.edu
      internal developer SIG, the official ucdavis GitHub org (441+ repos), the main
      website, library site, and status page. AggieData returned 403 (likely
      bot-blocked) and LinkedIn returned 999 (anti-scraping), both expected. No openly
      documented public library/repository REST API was confirmed, so none was
      fabricated. Most identity and administrative APIs are gated behind institutional
      affiliation rather than open signup.
